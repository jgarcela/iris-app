{# templates/register.html #}
{% extends 'base.html' %}
{% block title %}Registro de cuenta{% endblock %}

{% block content %}
<div class="card mx-auto mt-5 p-4 p-md-5" style="max-width: 460px;">
  <p class="clay-label mb-2" style="color: var(--matcha-600);">{{ _('Únete a IRIS') }}</p>
  <h2 class="mb-4" style="font-family: var(--font-display); font-weight: 600; letter-spacing: -0.03em;">Registro de cuenta</h2>

  <form id="register-form" class="form">
    <div class="mb-3">
      <label for="first_name" class="form-label">Nombre</label>
      <input type="text" id="first_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="last_name" class="form-label">Apellido</label>
      <input type="text" id="last_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Correo electrónico</label>
      <input type="email" id="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <input type="password" id="password" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="confirm" class="form-label">Confirmar contraseña</label>
      <input type="password" id="confirm" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success w-100 rounded-pill">Registrarse</button>
  </form>

  <p class="mt-4 mb-0 text-center">
    ¿Ya tienes cuenta?
    <a href="{{ url_for('auth.login') }}" style="color: var(--ube-800); font-weight: 500;">Inicia sesión aquí</a>
  </p>
</div>
{% endblock %}

{% block scripts_extra %}
<script>
    // Se inyecta desde tu view la URL de registro de la API
    window.api_url_register = {{ api_url_register | tojson | safe }};
</script>

<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const first_name = this.first_name.value.trim();
  const last_name  = this.last_name.value.trim();
  const email      = this.email.value.trim().toLowerCase();
  const password   = this.password.value;
  const confirm    = this.confirm.value;

  if (password !== confirm) {
    alert('Las contraseñas no coinciden.');
    return;
  }

  try {
    const res = await fetch(window.api_url_register, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        first_name,
        last_name,
        email,
        password
      })
    });
    const data = await res.json();

    if (!res.ok) {
      alert(data.msg || 'Error al registrar');
      return;
    }

    alert('Registro exitoso. Por favor, inicia sesión.');
    window.location.href = "{{ url_for('auth.login') }}";
  } catch (err) {
    console.error(err);
    alert('Error de red, inténtalo de nuevo.');
  }
});
</script>
{% endblock %}
